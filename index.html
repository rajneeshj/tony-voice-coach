<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rajneesh Jain Mindset Coach</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #0d1117;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        h1 {
            font-size: 28px;
            margin-bottom: 10px;
            color: #ff5a36;
        }
        .mic-btn {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: none;
            background-color: #ff5a36;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 90, 54, 0.4);
            transition: transform 0.2s, background-color 0.2s;
            margin-top: 20px;
        }
        .mic-btn:active {
            transform: scale(0.95);
        }
        .status {
            margin-top: 30px;
            font-size: 20px;
            max-width: 600px;
            line-height: 1.5;
            color: #c9d1d9;
        }
    </style>
</head>
<body>

    <h1>Rajneesh Jain Mindset Coach</h1>
    <button id="start-btn" class="mic-btn">SPEAK 🎙️</button>
    <div id="status-text" class="status">Click the button when you are ready to change your state.</div>

    <script>
        const startBtn = document.getElementById('start-btn');
        const statusText = document.getElementById('status-text');

        const localEndpoint = "/api/tony";
        
        let conversationHistory = [];

        // Updated system prompt for root-cause troubleshooting 🧠
        const systemPrompt = `
        You are Rajneesh Jain, an elite peak performance and mindset coach specializing in root-cause troubleshooting. 
        - When the user shares a problem, DO NOT give immediate advice. Instead, ask ONE sharp, powerful diagnostic question to uncover the underlying bottleneck (e.g., fear, poor routine, limiting belief).
        - Keep the conversation in a "troubleshooting phase" for the first few turns, analyzing the user's answers in small chunks.
        - Speak with absolute certainty, intensity, and authority.
        - Keep your responses very brief, sharp, and punchy so they are easy to listen to as audio. Do not write long paragraphs.
        - Once the root cause is clear, pivot into driving them toward massive action with high-energy language.
        `;

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition;

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = true; 
            recognition.interimResults = false;
            recognition.lang = 'en-US';

            recognition.onresult = async (event) => {
                const currentResultIndex = event.resultIndex;
                const transcript = event.results[currentResultIndex][0].transcript;
                
                recognition.stop(); 
                await askRajneesh(transcript);
            };

            recognition.onerror = (event) => {
                statusText.innerText = "Speech recognition error. Let's try again.";
                resetButton();
            };
        }

        startBtn.addEventListener('click', () => {
            if (!SpeechRecognition) {
                statusText.innerText = "Speech recognition is not supported in this browser.";
                return;
            }
            
            statusText.innerText = "Listening... Speak your mind. Take your time to collect your thoughts.";
            startBtn.innerText = "🔴 LISTENING";
            recognition.start();
        });

        async function askRajneesh(userText) {
            try {
                statusText.innerText = "Rajneesh is processing your state...";

                conversationHistory.push({ role: "user", content: userText });

                const response = await fetch(localEndpoint, {
                    method: "POST",
                    headers: { "content-type": "application/json" },
                    body: JSON.stringify({ messages: conversationHistory, systemPrompt })
                });

                const data = await response.json();
                console.log("Backend response data:", data);
                
                if (data.content && data.content[0]) {
                    const aiResponse = data.content[0].text;
                    statusText.innerText = "Rajneesh says: " + aiResponse;
                    
                    conversationHistory.push({ role: "assistant", content: aiResponse });

                    speakLikeRajneesh(aiResponse);
                } else {
                    throw new Error("Invalid backend response");
                }

            } catch (error) {
                statusText.innerText = "Coaching connection paused.";
                console.error(error);
                resetButton();
            }
        }

       function speakLikeRajneesh(text) {
    if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel(); 

        const cleanText = text.replace(/[#*_\-❌🔴🎙️]/g, '').trim();
        const utterance = new SpeechSynthesisUtterance(cleanText);
        
        // Settings optimized for a natural, clear cadence
        utterance.rate = 1.0;  
        utterance.pitch = 1.0; 
        utterance.lang = 'en-IN'; // Setting the language target to Indian English

        const voices = window.speechSynthesis.getVoices();
        
        // Look for any available Indian English voice on the device
        const indianVoice = voices.find(voice => 
            voice.lang === 'en-IN' || 
            voice.lang.startsWith('en_IN') ||
            voice.name.includes('India')
        );

        if (indianVoice) {
            utterance.voice = indianVoice;
        } else {
            // Fallback to standard English if en-IN is completely missing
            const standardVoice = voices.find(voice => voice.lang.startsWith('en'));
            if (standardVoice) utterance.voice = standardVoice;
        }

            utterance.lang = selectedVoice.lang; 
        }

        function resetButton() {
            startBtn.innerText = "SPEAK 🎙️";
            statusText.innerText = "Click the button when you are ready to speak again.";
        }
    </script>
</body>
</html>
