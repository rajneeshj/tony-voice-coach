<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tony Robbins Voice Coach</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #0d1117;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .mic-btn {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: none;
            background-color: #ff5a36;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 90, 54, 0.4);
            transition: transform 0.2s, background-color 0.2s;
        }
        .mic-btn:active {
            transform: scale(0.95);
        }
        .status {
            margin-top: 30px;
            font-size: 20px;
            max-width: 600px;
            line-height: 1.5;
            color: #c9d1d9;
        }
    </style>
</head>
<body>

    <button id="start-btn" class="mic-btn">SPEAK 🎙️</button>
    <div id="status-text" class="status">Click the button when you are ready to change your state.</div>

    <script>
        const startBtn = document.getElementById('start-btn');
        const statusText = document.getElementById('status-text');

        const localEndpoint = "/api/tony";
        
        // This array stores our continuous conversation history 🧠
        let conversationHistory = [];

        const systemPrompt = `
        You are Tony Robbins, the ultimate peak performance coach. Your mission is to shatter the user's limiting beliefs, eliminate passive waiting, and drive them into massive, disciplined action. 
        - Speak with absolute intensity, authority, and certainty.
        - Use high-energy, physical language (e.g., "shatter the pattern", "step into your power").
        - Focus heavily on shifting the user's "State" and "Identity".
        - Keep your responses brief, sharp, and punchy so they can be easily digested as audio. Do not write long paragraphs.
        - End every response by demanding a clear commitment to action.
        `;

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition;

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = true; 
            recognition.interimResults = false;
            recognition.lang = 'en-US';

            recognition.onresult = async (event) => {
                const currentResultIndex = event.resultIndex;
                const transcript = event.results[currentResultIndex][0].transcript;
                
                recognition.stop(); 
                await askTonyRobbins(transcript);
            };

            recognition.onerror = (event) => {
                statusText.innerText = "Speech recognition error. Let's try again.";
                resetButton();
            };
        }

        startBtn.addEventListener('click', () => {
            if (!SpeechRecognition) {
                statusText.innerText = "Speech recognition is not supported in this browser.";
                return;
            }
            
            statusText.innerText = "Listening... Speak your mind. Take your time to collect your thoughts.";
            startBtn.innerText = "🔴 LISTENING";
            recognition.start();
        });

        async function askTonyRobbins(userText) {
            try {
                statusText.innerText = "Tony is processing your state...";

                // 1. Save what the user just said into our memory array
                conversationHistory.push({ role: "user", content: userText });

                // 2. Send the entire history array to our updated backend
                const response = await fetch(localEndpoint, {
                    method: "POST",
                    headers: { "content-type": "application/json" },
                    body: JSON.stringify({ messages: conversationHistory, systemPrompt })
                });

                const data = await response.json();
                console.log("Backend response data:", data);
                
                if (data.content && data.content[0]) {
                    const aiResponse = data.content[0].text;
                    statusText.innerText = "Tony says: " + aiResponse;
                    
                    // 3. Save Tony's response into our memory array too
                    conversationHistory.push({ role: "assistant", content: aiResponse });

                    speakLikeTony(aiResponse);
                } else {
                    throw new Error("Invalid backend response");
                }

            } catch (error) {
                statusText.innerText = "Coaching connection paused.";
                console.error(error);
                resetButton();
            }
        }

        function speakLikeTony(text) {
            if ('speechSynthesis' in window) {
                // Clean formatting symbols before speaking
                const cleanText = text.replace(/[#*_\-]/g, '').trim();

                const utterance = new SpeechSynthesisUtterance(cleanText);
                utterance.rate = 1.2; 
                utterance.pitch = 1.0;
                utterance.lang = 'en-US';

                const voices = window.speechSynthesis.getVoices();
                const standardVoice = voices.find(voice => voice.lang === 'en-US');
                if (standardVoice) utterance.voice = standardVoice;

                utterance.onend = () => { resetButton(); };
                window.speechSynthesis.speak(utterance);
            } else {
                resetButton();
            }
        }

        function resetButton() {
            startBtn.innerText = "SPEAK 🎙️";
            statusText.innerText = "Click the button when you are ready to speak again.";
        }
    </script>
</body>
</html>
